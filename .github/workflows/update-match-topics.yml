name: Update match topics

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-match-topics
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh match states and PK topics
        run: node scripts/update-match-topics.mjs

      - name: Commit match feed changes
        run: |
          if git diff --quiet -- data/topics.json; then
            echo "No topic changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/topics.json
          git commit -m "Update live match topics"
          git push
